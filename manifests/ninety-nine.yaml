id: ninety-nine
name: "99"
category: commerce
subcategory: consumer
description: "99 ride-hailing — estimate rides, request drivers, track trips"
descriptionPt: "99 transporte — estimar corridas, solicitar motoristas, rastrear viagens"
baseUrl: https://api.99app.com/v1
auth:
  type: bearer
  envVars:
    - NINETY_NINE_API_KEY
tags: [99, ride, transport, mobility, brazil, consumer]
status: alpha
governance:
  governedTools:
    - request_ride
endpoints:
  - name: estimate_ride
    description: "Get ride price estimate between two points"
    descriptionPt: "Estima preço de corrida entre dois pontos"
    method: POST
    path: /rides/estimate
    body:
      - { name: origin_lat, type: number, required: true, description: "Origin latitude" }
      - { name: origin_lng, type: number, required: true, description: "Origin longitude" }
      - { name: dest_lat, type: number, required: true, description: "Destination latitude" }
      - { name: dest_lng, type: number, required: true, description: "Destination longitude" }
  - name: request_ride
    description: "Request a ride. GOVERNED."
    descriptionPt: "Solicita uma corrida. GOVERNADO."
    method: POST
    path: /rides
    governed: true
    body:
      - { name: origin_lat, type: number, required: true, description: "Origin latitude" }
      - { name: origin_lng, type: number, required: true, description: "Origin longitude" }
      - { name: dest_lat, type: number, required: true, description: "Destination latitude" }
      - { name: dest_lng, type: number, required: true, description: "Destination longitude" }
      - { name: category, type: string, required: false, description: "Ride category (pop, comfort, etc.)" }
  - name: track_ride
    description: "Track an active ride"
    descriptionPt: "Rastreia uma corrida ativa"
    method: GET
    path: /rides/{ride_id}
    params:
      - { name: ride_id, type: string, required: true, description: "Ride ID", location: path }
  - name: cancel_ride
    description: "Cancel a ride request"
    descriptionPt: "Cancela uma solicitação de corrida"
    method: POST
    path: /rides/{ride_id}/cancel
    params:
      - { name: ride_id, type: string, required: true, description: "Ride ID", location: path }
